# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  test:
    desc: Run middleware validation (tier 2 — requires Ollama)
    cmds:
      - python3 ./services/middleware/validate.py --tier 2
    silent: false

  test:1:
    desc: Run tier 1 only (pure logic, no connections)
    cmds:
      - python3 ./services/middleware/validate.py --tier 1
    silent: false

  test:3:
    desc: Run full stack validation (tier 3 — requires all connections)
    cmds:
      - python3 ./services/middleware/validate.py --tier 3
    silent: false

  ingest:
    desc: "Full re-index a vault. Usage: task ingest -- --vault /path --collection senna_memory"
    dir: services/watcher
    cmds:
      - python3 ingest.py {{.CLI_ARGS}}
    silent: false

  watch:
    desc: Start the vault watcher
    dir: services/watcher
    cmds:
      - python3 watcher.py
    silent: false