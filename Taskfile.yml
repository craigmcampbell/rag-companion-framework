# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  test:
    desc: Run validation (tier 2 — requires Ollama)
    cmds:
      - python3 ./ai-companion/validate.py --tier 2
    silent: false

  test:1:
    desc: Run tier 1 only (pure logic, no connections)
    cmds:
      - python3 ./ai-companion/validate.py --tier 1
    silent: false

  test:3:
    desc: Run full stack validation (tier 3 — requires all connections)
    cmds:
      - python3 ./ai-companion/validate.py --tier 3
    silent: false

  infra:up:
    desc: Start core infrastructure (chromadb, postgres, redis)
    cmds:
      - docker compose up chromadb postgres redis -d
    silent: false

  infra:down:
    desc: Stop all infrastructure
    cmds:
      - docker compose down
    silent: false

  infra:logs:
    desc: Tail infrastructure logs
    cmds:
      - docker compose logs -f chromadb postgres redis
    silent: false

  ingest:
    desc: "Full re-index a vault. Usage: task ingest -- --vault /path --collection senna_memory"
    dir: services/watcher
    cmds:
      - python3 ingest.py {{.CLI_ARGS}}
    silent: false

  install:
    desc: Install Python dependencies
    cmds:
      - pip3 install -r requirements.txt
    silent: false

  watch:
    desc: Start the vault watcher
    dir: services/watcher
    cmds:
      - python3 watcher.py
    silent: false