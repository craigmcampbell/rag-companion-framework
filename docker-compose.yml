services:
  # ── Shared infrastructure ──────────────────────────────────────────────────

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8100:8000" # 81XX convention; internal is always 8000

  # ── Vault watcher ──────────────────────────────────────────────────────────

  watcher:
    build: ./services/watcher
    restart: unless-stopped
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8100
      - EMBEDDING_MODEL=all-mpnet-base-v2
      - EXCLUDED_FOLDERS=Meta,.obsidian,Templates
    depends_on:
      - chromadb
    volumes:
      - ${SENNA_VAULT_PATH}:/vaults/senna:ro
      - ${STARFORGED_VAULT_PATH}:/vaults/starforged:ro
      - model_cache:/root/.cache/huggingface

  # ── Middleware ─────────────────────────────────────────────────────────────

  middleware:
    build: ./services/middleware
    restart: unless-stopped
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8100
      - EMBEDDING_MODEL=all-mpnet-base-v2
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=mistral-nemo:12b
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=deepseek/deepseek-chat
      - MIDDLEWARE_PORT=8200
    depends_on:
      - chromadb
    extra_hosts:
      - "host.docker.internal:host-gateway" # lets middleware reach Ollama on host

  # ── SillyTavern — Senna campaign ──────────────────────────────────────────

  sillytavern-senna:
    image: ghcr.io/sillytavern/sillytavern:latest
    container_name: sillytavern-senna
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - FORCE_COLOR=1
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ./sillytavern/senna/config:/home/node/app/config
      - ./sillytavern/senna/data:/home/node/app/data
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      - middleware

  # ── SillyTavern — Starforged campaign ─────────────────────────────────────

  sillytavern-starforged:
    image: ghcr.io/sillytavern/sillytavern:latest
    container_name: sillytavern-starforged
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - FORCE_COLOR=1
    ports:
      - "127.0.0.1:8011:8000"
    volumes:
      - ./sillytavern/starforged/config:/home/node/app/config
      - ./sillytavern/starforged/data:/home/node/app/data
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      - middleware

volumes:
  chroma_data:
  model_cache:
