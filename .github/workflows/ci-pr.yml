name: CI (PR Fast)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  middleware-fast:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install basedpyright pyyaml

      - name: Typecheck middleware
        run: |
          basedpyright services/middleware

      - name: Run tier 1 validation
        run: |
          python services/middleware/validate.py --tier 1

      - name: Validate Taskfile YAML parses
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          taskfile = pathlib.Path("Taskfile.yml")
          yaml.safe_load(taskfile.read_text())
          print("Taskfile.yml OK")
          PY
